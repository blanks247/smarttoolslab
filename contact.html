<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us | SmartToolsLab</title>
    <meta name="description"
        content="Get in touch with the SmartToolsLab team for support, business inquiries, or feature requests." />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1284080005532972" crossorigin="anonymous"></script>
</head>

<body>

    <header class="site-header">
        <nav class="nav-inner">
            <a href="index.html" class="logo">
                <div class="logo-icon">⚡</div>Smart<span>Tools</span>Lab
            </a>
            <div class="nav-center"><a href="index.html#tools">All Tools</a><a href="index.html#features">Features</a>
            </div>
            <div class="nav-right"><a href="index.html#tools" class="nav-cta">🚀 Try Free</a></div>
        </nav>
    </header>

    <div class="section" style="max-width:600px;margin:0 auto;padding-top:60px;padding-bottom:100px;">
        <div class="breadcrumb"><a href="index.html">Home</a> <span>›</span> <span>Contact Us</span></div>
        <h1 class="section-title" style="margin-bottom:16px;">Contact Us</h1>
        <p class="section-desc" style="margin-bottom:32px;">Have a tool request, spotted a bug, or want to discuss
            advertising? Drop us an email.</p>

        <div class="tool-box">
            <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-input" placeholder="Your name" />
            </div>
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-input" placeholder="you@example.com" />
            </div>
            <div class="form-group">
                <label class="form-label">Message</label>
                <textarea class="form-textarea" rows="6" placeholder="How can we help you?"></textarea>
            </div>
            <button class="btn btn-primary" onclick="alert('Message sent! (Note: This is a static demo)')">📨 Send
                Message</button>
        </div>

        <div style="margin-top:32px;text-align:center;color:var(--fg-4);font-size:0.85rem;">
            Or email us directly at <strong style="color:var(--fg-3);">hello@smarttoolslab.com</strong>
        </div>
    </div>

    <footer class="site-footer">
        <div class="footer-inner">
            <div class="footer-bottom"><span>© 2024 SmartToolsLab</span><span>Contact Us</span></div>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>

</html>
